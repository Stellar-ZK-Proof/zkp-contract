name: Build & Deploy Contract

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to testnet?'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']

env:
  CARGO_TERM_COLOR: never
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  DEPLOYER_ADDR: "GA2LCOB7EO77Q52NO4R3TJ2UTAV7NG3P7S26QUV2YSMIE7UHNUWKBE7V"
  RPC: "https://soroban-testnet.stellar.org"
  NET: "Test SDF Network ; September 2015"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.deploy == 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - run: cargo build --target wasm32-unknown-unknown --release
      - run: cargo test
      - uses: actions/upload-artifact@v4
        with:
          name: zkp-private-pay-wasm
          path: target/wasm32-unknown-unknown/release/zkp_private_pay.wasm
          retention-days: 30

  build-and-deploy:
    name: Build, Test & Deploy to Testnet
    runs-on: ubuntu-latest
    if: github.event.inputs.deploy == 'true'
    env:
      SOROBAN_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Run tests
        run: cargo test

      - name: Fund account via Friendbot
        run: |
          curl -sf "https://friendbot.stellar.org?addr=$DEPLOYER_ADDR" -o /tmp/fb.json || true
          python3 -c "import json; d=json.load(open('/tmp/fb.json')); print('Funded:', d.get('hash','already funded'))" 2>/dev/null || echo "May already be funded"

      - name: Install deploy dependencies
        run: cd scripts && npm install

      - name: Deploy, initialize and whitelist
        shell: bash
        run: |
          set -uo pipefail
          WASM=target/wasm32-unknown-unknown/release/zkp_private_pay.wasm
          echo "Running deploy script..."
          node scripts/deploy.mjs "$WASM" >/tmp/deploy_stdout.txt 2>/tmp/deploy_stderr.txt || true
          NODE_EXIT=$?
          # Always write logs artifact
          {
            echo "=== EXIT CODE: $NODE_EXIT ==="
            echo "=== STDERR ==="
            cat /tmp/deploy_stderr.txt
            echo "=== STDOUT ==="
            cat /tmp/deploy_stdout.txt
          } > /tmp/deploy_log.txt
          # Write to step summary (readable via API)
          echo "## Deploy Log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/deploy_log.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/deploy_log.txt
          if [ $NODE_EXIT -ne 0 ]; then
            exit $NODE_EXIT
          fi
          CONTRACT_ID=$(cat /tmp/deploy_stdout.txt | tr -d "[:space:]")
          if [ -z "$CONTRACT_ID" ]; then
            echo "ERROR: No contract ID in output"
            exit 1
          fi
          echo "CONTRACT_ID=$CONTRACT_ID" >> "$GITHUB_ENV"
          echo "Deployed: $CONTRACT_ID"

      - name: Save log to repo (always)
        if: always()
        run: |
          git config user.email "ci@zkp-private-pay.dev"
          git config user.name "CI Deploy"
          cp /tmp/deploy_log.txt deploy_log.txt 2>/dev/null || echo "No log file" > deploy_log.txt
          git add deploy_log.txt
          git commit -m "ci: deploy log [skip ci]" || true
          git push origin main || true

      - name: Save deployment receipt
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          printf '{"contract_id":"%s","network":"testnet","explorer":"https://stellar.expert/explorer/testnet/contract/%s","deployer":"%s","deployed_at":"%s"}'             "$CONTRACT_ID" "$CONTRACT_ID" "$DEPLOYER_ADDR" "$TS" | python3 -m json.tool > deployment.json
          cat deployment.json

      - uses: actions/upload-artifact@v4
        with:
          name: deployment-receipt
          path: deployment.json

      - name: Job summary
        run: |
          {
            echo "## ✅ Contract Deployed to Stellar Testnet"
            echo ""
            echo "**Contract ID:** \`$CONTRACT_ID\`"
            echo ""
            echo "[🔍 View on Stellar Expert](https://stellar.expert/explorer/testnet/contract/$CONTRACT_ID)"
            echo ""
            echo "### Copy to your .env files"
            echo '```'
            echo "CONTRACT_ID=$CONTRACT_ID"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
